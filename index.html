          const calcBase = totalDays * 100 + startHour;
          const step1 = ((calcBase << 11) ^ calcBase) >>> 0;

          const [logs, setLogs] = useState([]);

          useEffect(() => {
            if (!isOpen || !mobId) return;
            
            const q = query(
              collection(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${server}`, mobId, 'history'),
			  orderBy('timestamp', 'desc'),
              limit(50) 
            );
            
            return onSnapshot(q, (snap) => {
              const list = [];
              snap.forEach(d => list.push({ ...d.data(), id: d.id }));
              list.sort((a, b) => b.timestamp - a.timestamp);
              setLogs(list);

          const [confirmModal, setConfirmModal] = useState({ isOpen: false, id: null, name: '', window: 0, type: 'kill' });
          const [copyStatus, setCopyStatus] = useState(null);
          const [historyTarget, setHistoryTarget] = useState({ isOpen: false, mobId: null, mobName: '' }); 

          const scrollRef = useRef(null);
          const isDragging = useRef(false);
          const startX = useRef(0);
          const scrollLeftVal = useRef(0);

          const isMidnight = theme === 'midnight';
          const styles = {
            bg: isMidnight ? 'bg-[#0a0b10] text-slate-200' : 'bg-slate-50 text-slate-900',
            headerBg: isMidnight ? 'bg-[#12141e]/90 border-white/5 backdrop-blur-xl' : 'bg-white/80 border-slate-200 shadow-sm',
            card: isMidnight ? 'bg-[#1a1d27] border-white/5 shadow-2xl' : 'bg-white border-slate-200 shadow-sm',
            inner: isMidnight ? 'bg-black/40 border-white/5' : 'bg-slate-100 border-slate-200',
            btn: isMidnight ? 'bg-[#252a3a] border-white/10 text-slate-300 hover:text-white' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-100',
            specialKing: isMidnight ? 'bg-gradient-to-br from-amber-900/60 via-purple-900/40 to-slate-900/80 border-amber-500/40' : 'bg-gradient-to-br from-amber-50 to-purple-50 border-amber-300/60',
            readyGlowS: isMidnight ? 'border-yellow-500/40 shadow-[0_0_25px_rgba(234,179,8,0.25)] ring-2 ring-yellow-500/20' : 'border-yellow-500/50 bg-yellow-50/5',
            readyGlowA: isMidnight ? 'border-blue-500/40 shadow-[0_0_25px_rgba(59,130,246,0.25)] ring-2 ring-blue-500/20' : 'border-blue-500/50 bg-blue-50/5'
          };

		const logAction = async (mobId, mobName, actionType, details = "") => {
		  try {
			const historyRef = collection(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, mobId, 'history');

			await addDoc(historyRef, {
			  mobName,
			  action: actionType, 
			  details,
			  timestamp: Date.now(),
			  userLabel: isAdmin ? '領隊 (Admin)' : '獵人 (Hunter)' 
			});

			const q = query(historyRef, orderBy('timestamp', 'desc'));
			const snapshot = await getDocs(q);
			
			if (snapshot.size > 50) {
			  const toDelete = snapshot.docs.slice(50);
			  toDelete.forEach(async (docSnapshot) => {
				await deleteDoc(docSnapshot.ref);
			  });
			}

		  } catch (e) { console.error("Log error:", e); }
		};

          const eorzeaData = useMemo(() => {
            const totalETSeconds = (currentTime * EORZEA_RATIO) / 1000;
            const etHours = Math.floor(totalETSeconds / 3600) % 24;
            const etDay = (Math.floor(totalETSeconds / 86400) % 32) + 1; 
            let moonLabel = "殘月";
            if (etDay <= 4) moonLabel = "新月"; else if (etDay <= 8) moonLabel = "眉月"; else if (etDay <= 20 && etDay >= 16) moonLabel = "滿月";
            
            const earthSeconds = currentTime / 1000;
            const curVal = calculateWeatherValue(earthSeconds);
            const nxtVal = calculateWeatherValue(earthSeconds + 1400);

            const nWinStart = (Math.floor(etHours / 8) + 1) * 8;
            const ltToNext = (nWinStart - etHours) * ET_HOUR_IN_LT - ((Math.floor(totalETSeconds / 60) % 60) * ET_MINUTE_IN_LT);
            
            return {
              hours: etHours, day: etDay, moonLabel, curVal, nxtVal, totalSeconds: totalETSeconds,
              displayTime: `${etHours.toString().padStart(2, '0')}:${(Math.floor(totalETSeconds / 60) % 60).toString().padStart(2, '0')}`,
              nextIn: `${Math.floor(ltToNext / 60000)}m ${Math.floor((ltToNext % 60000) / 1000)}s`
            };
          }, [currentTime]);

          useEffect(() => {
            const initAuth = async () => {
              try { await signInAnonymously(auth); } catch (e) {}
            };
            initAuth();
            const unsubAuth = onAuthStateChanged(auth, setUser);
            const itv = setInterval(() => setCurrentTime(Date.now()), 1000);
            return () => { unsubAuth(); clearInterval(itv); };
          }, []);

          useEffect(() => {
            if (!user) return;
            setLoading(true);
            const colRef = collection(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`);
            return onSnapshot(colRef, (snap) => {
              const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setTimers(d); setLoading(false);
            }, (err) => setLoading(false));
          }, [user, selectedServer]);

          const verifyAdminHandler = async () => {
            const hashValue = await sha256(inputKey);
            if (hashValue === ADMIN_KEY_HASH) {
              setIsAdmin(true); 
              try { localStorage.setItem('ff-is-admin', 'true'); } catch(e) {}
              setShowAdminModal(false); setInputKey("");
            } else {
                alert("密碼錯誤");
            }
          };

          const handleUpdateKillTime = async (id, win) => {
            if (!isAdmin || !user || !customTimeInput) return;
            try {
              const selectedTs = new Date(customTimeInput).getTime();
              if (isNaN(selectedTs)) return;
              await setDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, id), {
                startTime: selectedTs, endTime: selectedTs + (win * 3600000), updatedAt: Date.now(), isManual: true, windowHours: win
              }, { merge: true });
              
              logAction(id, id, 'EDIT', `手動調整時間至 ${new Date(customTimeInput).toLocaleTimeString()}`);

              setEditingTimeId(null);
              setCustomTimeInput("");
            } catch (e) {}
          };

          const requestToggleKill = (id, cn, win) => {
            const isKilled = !!(timers[id] && timers[id].endTime > currentTime);
            setConfirmModal({ isOpen: true, id, name: cn, window: win, type: isKilled ? 'reset' : 'kill' });
          };

          const executeToggleKill = async () => {
            const { id, window, type, name } = confirmModal;
            if (!user) return;
            const mobRef = doc(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, id);
            if (type === 'reset') {
               await setDoc(mobRef, {});
               logAction(id, name, 'RESET', '重置了計時器'); 
            }
            else {
               await setDoc(mobRef, { startTime: Date.now(), endTime: Date.now() + (window * 3600000), updatedAt: Date.now(), windowHours: window }, { merge: true });
               logAction(id, name, 'KILL', `標記擊殺，冷卻 ${window} 小時`); 
            }
            setConfirmModal({ ...confirmModal, isOpen: false });
          };

          const copyMacro = () => {
            const txt = `[巡迴名單]\n` + trainList.map((m, i) => `${i + 1}. [${m.server}] ${m.zone} | ${m.cn}`).join('\n');
            const t = document.createElement("textarea"); t.value = txt; document.body.appendChild(t); t.select();
            try { document.execCommand('copy'); setCopyStatus("已複製！"); } catch (e) { setCopyStatus("複製失敗"); }
            document.body.removeChild(t);
            setTimeout(() => setCopyStatus(null), 2000);
          };

          const toggleTrainMob = (mob) => {
            const targetServer = selectedServer;
            setTrainList(prev => {
              const existing = prev.find(item => item.id === mob.id && item.server === targetServer);
              if (existing) {
                return prev.filter(item => item !== existing);
              } else {
                return [...prev, { ...mob, server: targetServer, uniqueId: crypto.randomUUID() }];
              }
            });
          };

          const currentViewData = useMemo(() => {
            const sList = []; const aList = [];
            const safeData = {...HUNT_DATA};
            if(!safeData.dt) safeData.dt = {s:[], a:[]}; 

            Object.keys(safeData).forEach(k => {
              const info = EXPANSIONS.find(e => e.id === k);

                  if (safeData[k].a) safeData[k].a.forEach((m, idx) => aList.push({ ...m, id: `${k}-a-${idx}`, expKey: k, expName: info.name, rank: 'a' }));
              }
            });
            const filter = (l) => activeTab === 'all' ? l : l.filter(m => m.expKey === activeTab);
            const sFinal = filter(sList); const aFinal = filter(aList);

              const fn = (a, b) => {
                const aR = !timers[a.id]?.endTime || timers[a.id].endTime <= currentTime;
                const bR = !timers[b.id]?.endTime || timers[b.id].endTime <= currentTime;
                return aR === bR ? 0 : aR ? -1 : 1;

            } else {
               const specialSort = (a, b) => {
                 const aS = a.zone.includes('全境');
                 const bS = b.zone.includes('全境');

                 if (!aS && bS) return 1;
                 return 0;
               };
               sFinal.sort(specialSort); aFinal.sort(specialSort);
            }
            return { s: sFinal, a: aFinal };
          }, [activeTab, timers, sortByStatus, currentTime]);

			const liveAlerts = useMemo(() => {
			            const res = [];
			            Object.keys(HUNT_DATA).forEach(k => {
			                if (activeTab !== 'all' && activeTab !== k) return;			
			                if(HUNT_DATA[k].s) HUNT_DATA[k].s.forEach((m, i) => {
			                   const id = `${k}-s-${i}`;
			                   if (!timers[id]?.endTime || timers[id].endTime <= currentTime) {
			                       res.push({ ...m, id, rank: 's', expKey: k });
			                   }
			                });
			                if(HUNT_DATA[k].a) HUNT_DATA[k].a.forEach((m, i) => {
			                   const id = `${k}-a-${i}`;
			                   if (!timers[id]?.endTime || timers[id].endTime <= currentTime) {
			                       res.push({ ...m, id, rank: 'a', expKey: k });
			                   }
			                });
			            });
			            return res.slice(0, 30);
			          }, [timers, currentTime, activeTab]);

          return (
            <div className={`min-h-screen ${styles.bg} p-4 pb-96 font-black transition-all duration-500`}>
              <header className={`mb-4 md:mb-8 border-b ${styles.headerBg} p-4 md:p-8 rounded-[2rem] md:rounded-[2.5rem] flex flex-col xl:flex-row justify-between items-start gap-4 md:gap-8 relative z-20 font-black`}>
                <div className="flex-1 w-full font-black">
                  <div className="flex items-center gap-3 md:gap-4 mb-4 font-black">
                     <div className="p-3 md:p-4 bg-yellow-500/10 rounded-2xl border-2 border-yellow-500/30 font-black">

                     </div>
                     <div className="text-left font-black">

                     </div>
                  </div>
                  
                  <div className="grid grid-cols-3 md:flex gap-2 md:gap-4 font-black">
                    <button onClick={() => { if(isAdmin){ setIsAdmin(false); localStorage.setItem('ff-is-admin', 'false'); } else { setShowAdminModal(true); } }} className={`px-2 py-2 md:px-5 md:py-2.5 rounded-xl border-2 text-[10px] md:text-[11px] uppercase transition-all shadow-sm font-black ${isAdmin ? 'bg-emerald-600/20 border-emerald-500 text-emerald-400' : styles.btn}`}>{isAdmin ? '領隊 ON' : '領隊授權'}</button>
                    <button onClick={() => setShowWeatherModal(true)} className={`px-2 py-2 md:px-5 md:py-2.5 rounded-xl border-2 text-[10px] md:text-[11px] uppercase font-black ${styles.btn}`}>天氣預報</button>
                    <button onClick={() => { const nt = isMidnight?'sunlight':'midnight'; setTheme(nt); localStorage.setItem('ff-theme', nt); }} className={`px-2 py-2 md:px-5 md:py-2.5 rounded-xl border-2 text-[10px] md:text-[11px] uppercase font-black ${styles.btn}`}>{isMidnight ? '切換日光' : '切換深夜'}</button>
                  </div>
                </div>

                <div className="w-full xl:w-auto grid grid-cols-1 md:flex md:flex-row gap-2 md:gap-4 font-black">
                  <div className={`px-4 py-3 md:px-6 md:py-4 rounded-2xl border-2 flex items-center gap-3 md:gap-4 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>
                      <Moon className="w-5 h-5 md:w-6 md:h-6 text-indigo-400 font-black" />
                      <div><div className="text-[10px] text-slate-500 uppercase font-black">Moon</div><div className="text-lg md:text-xl font-black">{eorzeaData.moonLabel}</div></div>
                  </div>
                  <div className={`px-4 py-3 md:px-6 md:py-4 rounded-2xl border-2 flex items-center gap-3 md:gap-4 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>
                      <Sun className="w-5 h-5 md:w-6 md:h-6 text-yellow-500 font-black" />
                      <div><div className="text-[10px] text-slate-500 uppercase font-black">ET</div><div className="text-xl md:text-3xl font-mono font-black">{eorzeaData.displayTime}</div></div>
                  </div>
                  <div className={`px-4 py-3 md:px-6 md:py-4 rounded-2xl border-2 flex items-center gap-3 md:gap-4 ${isMidnight ? 'bg-blue-500/10 border-blue-500/20' : 'bg-white border-blue-500/20'}`}>
                      <Clock className="w-5 h-5 md:w-6 md:h-6 text-blue-500 font-black" />
                      <div><div className="text-[10px] text-slate-500 uppercase font-black">LT</div><div className="text-xl md:text-2xl font-mono font-black">{new Date(currentTime).toLocaleTimeString([], {hour12:false})}</div></div>
                  </div>
                </div>
              </header>

              <div className={`mb-6 md:mb-10 flex flex-col md:flex-row items-stretch border rounded-[2rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl backdrop-blur-md ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'} font-black`}>
                <div className="w-full md:w-auto h-12 md:h-auto px-6 md:px-8 py-2 md:py-4 bg-gradient-to-r md:bg-gradient-to-br from-blue-600 to-indigo-700 text-white flex md:flex-col flex-row items-center justify-between md:justify-center gap-3 font-black">
                    <div className="flex items-center gap-2 md:gap-0 md:flex-col">
                        <Megaphone className="w-5 h-5 md:w-6 md:h-6 animate-bounce" />
                        <span className="text-[10px] md:text-[10px] uppercase font-black tracking-widest mt-0 md:mt-1">Live Feed</span>
                    </div>
                    <span className="md:hidden text-[10px] opacity-60 font-normal tracking-wider">左右滑動 ↔</span>
                </div>

                <div 
                  ref={scrollRef}
                  onMouseDown={(e) => { isDragging.current = true; startX.current = e.pageX - scrollRef.current.offsetLeft; scrollLeftVal.current = scrollRef.current.scrollLeft; }}
                  onMouseMove={(e) => { if (!isDragging.current) return; e.preventDefault(); const walk = (e.pageX - scrollRef.current.offsetLeft - startX.current) * 2; scrollRef.current.scrollLeft = scrollLeftVal.current - walk; }}
                  onMouseUp={() => isDragging.current = false} onMouseLeave={() => isDragging.current = false}
                  className="flex-1 flex gap-4 overflow-x-auto custom-scrollbar-horizontal py-4 px-4 md:py-6 md:px-6 items-center cursor-grab active:cursor-grabbing select-none font-black"
                >
                  {liveAlerts.length > 0 ? liveAlerts.map(m => {
                    const timer = timers[m.id];
                    const statusObj = formatStatusObj(timer?.endTime, currentTime, isMidnight, m.rank);
                    const winText = getCombinedWindowText(m, eorzeaData);
                    const isSpecial = m.rank === 'ss' || m.zone.includes('全境');
                    let baseColor = 'slate'; 
                    let dotColorClass = 'bg-slate-400';
                    let borderColorClass = 'border-slate-300';
                    let bgGradientClass = 'from-slate-500/5';
                    const isS_Open = m.rank === 's' && winText && (winText.includes("開放剩餘") || winText === "窗口符合條件");

                    if (isSpecial) {
                        baseColor = 'purple';
                        dotColorClass = 'bg-purple-500 shadow-[0_0_10px_rgba(168,85,247,0.8)] animate-pulse';
                        borderColorClass = 'border-purple-500';
                        bgGradientClass = 'from-purple-500/20';
                    } else if (isS_Open) {
                        baseColor = 'emerald';
                        dotColorClass = 'bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)] animate-pulse';
                        borderColorClass = 'border-emerald-500';
                        bgGradientClass = 'from-emerald-500/20';
                    } else if (statusObj.color.includes('text-red')) {
                        baseColor = 'red';
                        dotColorClass = 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-bounce';
                        borderColorClass = 'border-red-500';
                        bgGradientClass = 'from-red-500/15';
                    } else if (statusObj.color.includes('text-amber')) {
                        baseColor = 'amber';
                        dotColorClass = 'bg-amber-500 animate-pulse';
                        borderColorClass = 'border-amber-500';
                        bgGradientClass = 'from-amber-500/15';
                    } else if (statusObj.color.includes('text-emerald')) {
                        baseColor = 'emerald';
                        dotColorClass = 'bg-emerald-500';
                        borderColorClass = 'border-emerald-500';
                        bgGradientClass = 'from-emerald-500/15';
                    } else if (statusObj.color.includes('text-blue')) {
                        baseColor = 'blue';
                        dotColorClass = 'bg-blue-500';
                        borderColorClass = 'border-blue-500';
                        bgGradientClass = 'from-blue-500/10';
                    }

                    const titleColor = isMidnight ? 'text-slate-200' : 'text-slate-800';
                    const subTitleColor = isMidnight ? `text-${baseColor}-300` : `text-${baseColor}-600`;

                    return (
                      <div key={m.id} onClick={() => setActiveTab(m.expKey)} 
                           className={`
                             relative flex-shrink-0 flex flex-col justify-center px-5 py-3 md:px-6 md:py-3 rounded-r-2xl border-l-[6px] cursor-pointer transition-all duration-300 hover:-translate-y-1 min-w-[160px] md:min-w-[180px]
                             ${borderColorClass}
                             bg-gradient-to-r ${bgGradientClass} to-transparent
                             ${isSpecial ? 'shadow-[0_0_15px_rgba(168,85,247,0.2)]' : ''}
                           `}>
                        <div className={`text-[10px] font-black uppercase tracking-widest mb-1.5 opacity-80 ${subTitleColor}`}>
                          [{selectedServer}] {isSpecial ? 'SPECIAL' : `${m.rank.toUpperCase()}`}
                        </div>
                        <div className="flex items-center gap-2.5">
                          <div className={`w-2.5 h-2.5 rounded-full flex-shrink-0 ${dotColorClass}`}></div>
                          <div className={`text-base md:text-lg font-black tracking-tight leading-none ${titleColor}`}>{m.cn}</div>
                        </div>
                      </div>
                    );
                  }) : (
                    <div className="flex items-center gap-3 px-4 py-2 opacity-40 select-none font-black">
                       <Loader2 className="w-4 h-4 animate-spin text-slate-400"/>
                       <span className="text-xs text-slate-500 font-bold tracking-widest uppercase">Scanning...</span>
                    </div>
                  )}
                </div>
              </div>

              <div className="flex flex-wrap gap-2 mb-6 bg-black/10 p-2 rounded-2xl font-black">
                {SERVERS.map(s => <button key={s} onClick={() => {setSelectedServer(s);localStorage.setItem('ff-server',s);}} className={`flex-1 py-4 rounded-xl text-xs font-black transition-all ${selectedServer===s?'bg-blue-600 text-white shadow-xl shadow-blue-900/30':'bg-transparent text-slate-500 hover:bg-white/5 font-black'}`}>{s}</button>)}
              </div>

              <div className="flex flex-col gap-6 mb-12 font-black">
                <div className="relative scroll-gradient-mask">
                  <div className="flex flex-nowrap gap-3 overflow-x-auto pb-4 scrollbar-hide font-black px-1">
                    {EXPANSIONS.map(exp => (
                      <button 
                        key={exp.id} 
                        onClick={() => setActiveTab(exp.id)} 
                        className={`
                          flex-shrink-0 px-7 py-4 rounded-3xl text-xs font-black transition-all border-2 whitespace-nowrap
                          ${activeTab === exp.id 
                            ? `${exp.color} border-transparent text-white shadow-xl scale-105` 
                            : `${isMidnight ? 'bg-white/5 border-white/5 text-slate-400' : 'bg-white border-slate-200 text-slate-500'}`
                          }
                        `}
                      >
                        {exp.name}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="flex justify-end items-center gap-4">
                  <div className={`${isMidnight ? 'bg-black/40 border-white/5' : 'bg-white border-slate-200'} border-2 rounded-2xl p-1 flex gap-1 font-black`}>
                    <button onClick={() => setViewMode('card')} className={`p-2.5 rounded-xl transition-all ${viewMode==='card'?'bg-blue-600 text-white shadow-lg':''}`}><LayoutGrid className="w-5 h-5"/></button>
                    <button onClick={() => setViewMode('list')} className={`p-2.5 rounded-xl transition-all ${viewMode==='list'?'bg-blue-600 text-white shadow-lg':''}`}><List className="w-5 h-5"/></button>
                  </div>
                  <button onClick={() => setSortByStatus(!sortByStatus)} className={`px-6 py-3 rounded-2xl border-2 text-[11px] uppercase transition-all font-black ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>排序：{sortByStatus ? '重生優先' : '預設排序'}</button>
                </div>
              </div>

              {loading ? <div className="py-48 text-center animate-pulse font-black"><Loader2 className="w-20 h-20 mx-auto animate-spin mb-6 text-blue-500" /><p className="font-black">Syncing Data...</p></div> : (
                <div className={viewMode === 'card' ? "grid grid-cols-1 lg:grid-cols-2 gap-8 md:gap-16 font-black" : "flex flex-col gap-10 font-black"}>
                  <section className={viewMode === 'list' ? "w-full font-black" : "font-black"}>
                    <h2 className={`text-3xl md:text-4xl mb-6 md:mb-10 flex items-center gap-3 md:gap-5 px-6 font-black ${isMidnight ? 'text-white' : 'text-slate-900'}`}>
                        <Shield className="w-8 h-8 md:w-12 md:h-12 text-yellow-500 font-black" /> S-Rank
                    </h2>
                    
                    <div className={viewMode==='card' ? "flex flex-col gap-4 md:gap-10" : `flex flex-col border-2 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'} rounded-[2rem] md:rounded-[3.5rem] overflow-hidden divide-y divide-white/5 font-black`}>
                      {currentViewData.s.map(m => {
                        const timer = timers[m.id]; const isKilled = timer?.endTime > currentTime;
                        const statusObj = formatStatusObj(timer?.endTime, currentTime, isMidnight, 's'); 
                        const winText = getCombinedWindowText(m, eorzeaData);
                        const isSpecial = m.zone.includes('全境');
                        const isOpen = showTriggers[m.id];
                        const isEditing = editingTimeId === m.id;
                        const inTrain = trainList.some(t => t.id === m.id && t.server === selectedServer);

                      <button onClick={()=>setTrainList([])} className={`px-10 py-6 rounded-[2rem] border-2 text-sm font-black transition-all active:scale-95 font-black font-black font-black ${isMidnight ? 'bg-white/5 border-white/10 text-slate-400 hover:bg-red-900/40 hover:text-white' : 'bg-slate-100 text-slate-600 font-black font-black'}`}>清空</button>
                    </div>
                  </div>
                  <div className="max-w-7xl mx-auto flex gap-8 overflow-x-auto pb-12 custom-scrollbar px-8 font-black font-black font-black font-black">
                    {trainList.map((m, i) => (
                      <div key={`${m.uniqueId}-${i}`} className={`border-2 ${isMidnight ? 'bg-white/5 border-white/5 font-black font-black font-black font-black' : 'bg-white border-slate-200'} rounded-[3.5rem] p-10 min-w-[380px] flex items-center justify-between relative shadow-xl transition-all hover:scale-105 hover:border-blue-500/30`}>
                        <div className="absolute top-0 left-0 bg-yellow-600 text-white text-[12px] px-6 py-2.5 font-black rounded-br-3xl shadow-lg leading-none font-black font-black font-black">{i + 1}</div>
                        <div className="flex-1 mt-4 font-black font-black"><div className="text-[11px] text-blue-500 uppercase font-black mb-1.5 tracking-tighter">[{m.server}]</div><div className="text-xs text-slate-400 font-bold mb-1 font-black">{m.zone}</div><div className="text-2xl font-black font-black font-black">{m.cn}</div></div>
                        <button onClick={()=>setTrainList(trainList.filter((t) => t.uniqueId !== m.uniqueId))} className="ml-6 text-slate-400 hover:text-red-500 transition-all active:scale-150 font-black font-black font-black"><Trash2 className="w-8 h-8 font-black font-black"/></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
