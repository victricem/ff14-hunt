            btn: isMidnight ? 'bg-[#252a3a] border-white/10 text-slate-300 hover:text-white' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-100',
            specialKing: isMidnight ? 'bg-gradient-to-br from-amber-900/60 via-purple-900/40 to-slate-900/80 border-amber-500/40' : 'bg-gradient-to-br from-amber-50 to-purple-50 border-amber-300/60',
            readyGlowS: isMidnight ? 'border-yellow-500/40 shadow-[0_0_25px_rgba(234,179,8,0.25)] ring-2 ring-yellow-500/20' : 'border-yellow-500/50 bg-yellow-50/5',
            readyGlowA: isMidnight ? 'border-blue-500/40 shadow-[0_0_25px_rgba(59,130,246,0.25)] ring-2 ring-blue-500/20' : 'border-blue-500/50 bg-blue-50/5'
          };

          useEffect(() => {
            const unsubAuth = onAuthStateChanged(auth, async (u) => {
               if (u) {
                  setUser(u);
                  if (!u.isAnonymous) {
                      try {
                          const userRef = doc(db, 'users', u.uid);
                          const docSnap = await getDoc(userRef);
                          if (docSnap.exists()) {
                              const data = docSnap.data();
                              setHunterName(data.hunterName || '');
                              setTempName(data.hunterName || '');
                          }
                      } catch (e) { console.error("Profile Fetch Error", e); }
                  }
               } else {
                  signInAnonymously(auth).catch((e) => console.log('Anon login', e));
                  setHunterName('');
                  setTempName('');
               }
            });
            const itv = setInterval(() => setCurrentTime(Date.now()), 1000);
            return () => { unsubAuth(); clearInterval(itv); };
          }, []);

        const logAction = async (mobId, mobName, actionType, details = "") => {
            try {
              const historyRef = collection(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, mobId, 'history');
              const displayName = isAdmin ? '領隊 (Admin)' : (hunterName || '匿名獵人');
              const recorderUid = user && !user.isAnonymous ? user.uid : (isAdmin ? 'ADMIN' : 'ANONYMOUS');

              await addDoc(historyRef, { 
                  mobName, 
                  action: actionType, 
                  details, 
                  timestamp: Date.now(), 
                  userLabel: displayName,
                  uid: recorderUid
              });

              const q = query(historyRef, orderBy('timestamp', 'desc'));
              const snapshot = await getDocs(q);
              if (snapshot.size > 50) {
                const toDelete = snapshot.docs.slice(50);
                toDelete.forEach(async (docSnapshot) => await deleteDoc(docSnapshot.ref));
              }
            } catch (e) { console.error("Log error:", e); }
          };

          const loginWithGoogle = async () => {
            try { await signInWithPopup(auth, new GoogleAuthProvider()); } catch (e) { console.error("Login failed", e); }
          };

          const logout = async () => {
            try { await signOut(auth); setHunterName(''); setIsEditingName(false); } catch (e) {}
          };

          const handleSaveName = async () => {
             if (!user || user.isAnonymous) return;
             
             if (!tempName.trim() || tempName === hunterName) {
                 setTempName(hunterName);
                 setIsEditingName(false);
                 return;
             }

             try {
                 const userRef = doc(db, 'users', user.uid);
                 const docSnap = await getDoc(userRef);
                 const now = Date.now();
                 
                 if (docSnap.exists()) {
                     const data = docSnap.data();
                     if (data.lockExpiry && now < data.lockExpiry) {
                         const daysLeft = Math.ceil((data.lockExpiry - now) / (1000 * 60 * 60 * 24));
                         alert(`⛔ 稱號已鎖定\n\n您上次修改是在 30 天內，必須等待 ${daysLeft} 天後才能再次修改稱號。`);
                         setTempName(hunterName); 
                         setIsEditingName(false);
                         return;
                     }
                 }

                 const confirmMsg = hunterName 
                    ? `⚠️ 修改警告\n\n確定要將稱號改為「${tempName}」嗎？\n\n修改後將鎖定 30 天無法再次變更！`
                    : `✅ 確認稱號\n\n確定要使用「${tempName}」作為獵人稱號嗎？\n\n設定後 30 天內無法修改！`;

                 if (window.confirm(confirmMsg)) {
                     const lockUntil = now + (30 * 24 * 60 * 60 * 1000);
                     await setDoc(userRef, { 
                         hunterName: tempName, 
                         lockExpiry: lockUntil,
                         updatedAt: now 
                     }, { merge: true });
                     setHunterName(tempName);
                     setIsEditingName(false);
                 } else {
                     setTempName(hunterName);
                     setIsEditingName(false);
                 }
             } catch (e) {
                 alert("儲存失敗，請稍後再試。");
                 console.error(e);
             }
          };

          const eorzeaData = useMemo(() => {
            const totalETSeconds = (currentTime * EORZEA_RATIO) / 1000;
            const etHours = Math.floor(totalETSeconds / 3600) % 24;
            const etDay = (Math.floor(totalETSeconds / 86400) % 32) + 1;
            let moonLabel = "殘月"; if (etDay <= 4) moonLabel = "新月"; else if (etDay <= 8) moonLabel = "眉月"; else if (etDay <= 20 && etDay >= 16) moonLabel = "滿月";
            const earthSeconds = currentTime / 1000;
            const curVal = calculateWeatherValue(earthSeconds);
            const nxtVal = calculateWeatherValue(earthSeconds + 1400);
            const nWinStart = (Math.floor(etHours / 8) + 1) * 8;
            const ltToNext = (nWinStart - etHours) * ET_HOUR_IN_LT - ((Math.floor(totalETSeconds / 60) % 60) * ET_MINUTE_IN_LT);
            return { hours: etHours, day: etDay, moonLabel, curVal, nxtVal, totalSeconds: totalETSeconds, displayTime: `${etHours.toString().padStart(2, '0')}:${(Math.floor(totalETSeconds / 60) % 60).toString().padStart(2, '0')}`, nextIn: `${Math.floor(ltToNext / 60000)}m ${Math.floor((ltToNext % 60000) / 1000)}s` };
          }, [currentTime]);

          useEffect(() => {
            setLoading(true);
            const colRef = collection(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`);
            return onSnapshot(colRef, (snap) => { const d = {}; snap.forEach(doc => d[doc.id] = doc.data()); setTimers(d); setLoading(false); }, (err) => setLoading(false));
          }, [selectedServer]);

          const verifyAdminHandler = async () => {
            if (!user || user.isAnonymous) {
                alert("⛔ 權限驗證失敗\n\n請先點擊右上角登入 Google 帳號，才能進行領隊授權驗證。");
                return;
            }
            if (!inputKey) return;
            try {
                const inputHash = await sha256(inputKey);
                const docRef = doc(db, 'config', 'admin_settings');
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    const dbHash = docSnap.data().password_hash;
                    if (inputHash === dbHash) {
                        setIsAdmin(true);
                        try { localStorage.setItem('ff-is-admin', 'true'); } catch(e) {}
                        setShowAdminModal(false);
                        setInputKey("");
                        alert("🎉 領隊授權成功！");
                    } else {
                        alert("⛔ 密碼錯誤");
                    }
                } else {
                    console.error("尚未在資料庫設定密碼 (config/admin_settings)");
                    alert("系統錯誤：未設定管理員密碼庫");
                }
            } catch (e) {
                console.error("驗證失敗", e);
                alert("驗證過程發生錯誤");
            }
          };

          const handleUpdateKillTime = async (id, win) => {
            if (!isAdmin || !customTimeInput) return;
            try {
              const selectedTs = new Date(customTimeInput).getTime();
              if (isNaN(selectedTs)) return;
              await setDoc(doc(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, id), { startTime: selectedTs, endTime: selectedTs + (win * 3600000), updatedAt: Date.now(), isManual: true, windowHours: win }, { merge: true });
              logAction(id, id, 'EDIT', `手動調整時間至 ${new Date(customTimeInput).toLocaleTimeString()}`);
              setEditingTimeId(null); setCustomTimeInput("");
            } catch (e) {}
          };

          const requestToggleKill = (id, cn, win) => {
            const isKilled = !!(timers[id] && timers[id].endTime > currentTime);
            
            if (!isKilled && user && user.isAnonymous) {
                const doLogin = window.confirm("【防亂按機制】\n\n為防止惡意重置，請先登入 Google 帳號才能回報時間。\n(按下確定前往登入)");
                if (doLogin) loginWithGoogle();
                return;
            }

            if (!isKilled && !hunterName.trim()) {
                alert("【請設定稱號】\n\n為了保護您的隱私，請在右上角輸入您的「獵人稱號」後再進行操作。\n(您的 Google 帳號名稱不會被公開)");
                setIsEditingName(true); 
                return;
            }

            if (isKilled && !isAdmin) {
                alert("權限不足：只有領隊可以重置時間。");
                return;
            }
            setConfirmModal({ isOpen: true, id, name: cn, window: win, type: isKilled ? 'reset' : 'kill' });
          };


          const executeToggleKill = async () => {
            const { id, window, type, name } = confirmModal;
            const mobRef = doc(db, 'artifacts', appIdGlobal, 'public', 'data', `timers-${selectedServer}`, id);
            
            try {
                if (type === 'reset') { 
                    await setDoc(mobRef, {}); 
                    logAction(id, name, 'RESET', '重置了計時器'); 
                } else { 
                    await setDoc(mobRef, { 
                        startTime: Date.now(), 
                        endTime: Date.now() + (window * 3600000), 
                        updatedAt: Date.now(), 
                        windowHours: window 
                    }, { merge: true }); 
                    logAction(id, name, 'KILL', `標記擊殺，冷卻 ${window} 小時`); 
                }
                setConfirmModal({ ...confirmModal, isOpen: false });

            } catch (error) {
                console.error("更新失敗:", error);
                if (error.code === 'permission-denied') {
                    alert("⛔ 權限不足！更新失敗。");
                } else {
                    alert(`❌ 發生錯誤：${error.message}`);
                }
                setConfirmModal({ ...confirmModal, isOpen: false });
            }
          };

          const copyMacro = () => {
            const txt = `[巡迴名單]\n` + trainList.map((m, i) => `${i + 1}. [${m.server}] ${m.zone} | ${m.cn}`).join('\n');
            const t = document.createElement("textarea"); t.value = txt; document.body.appendChild(t); t.select();
            try { document.execCommand('copy'); setCopyStatus("已複製！"); } catch (e) { setCopyStatus("複製失敗"); }
            document.body.removeChild(t); setTimeout(() => setCopyStatus(null), 2000);
          };

          const toggleTrainMob = (mob) => {
            const targetServer = selectedServer;
            setTrainList(prev => {
              const existing = prev.find(item => item.id === mob.id && item.server === targetServer);
              if (existing) return prev.filter(item => item !== existing);
              else return [...prev, { ...mob, server: targetServer, uniqueId: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString() }];
            });
          };

          const onDragEnd = (result) => {
            if (!result.destination) return;
            const items = Array.from(trainList);
            const [reorderedItem] = items.splice(result.source.index, 1);
            items.splice(result.destination.index, 0, reorderedItem);
            setTrainList(items);
          };

          const currentViewData = useMemo(() => {
            const sList = []; const aList = [];
            const safeData = {...HUNT_DATA};
            if(!safeData.dt) safeData.dt = {s:[], a:[]}; 
            Object.keys(safeData).forEach(k => {
              const info = EXPANSIONS.find(e => e.id === k);
              if (info) {
                  if (safeData[k].s) safeData[k].s.forEach((m, idx) => sList.push({ ...m, id: `${k}-s-${idx}`, expKey: k, expName: info.name, rank: 's' }));
                  if (safeData[k].a) safeData[k].a.forEach((m, idx) => aList.push({ ...m, id: `${k}-a-${idx}`, expKey: k, expName: info.name, rank: 'a' }));
              }
            });
            const filter = (l) => activeTab === 'all' ? l : l.filter(m => m.expKey === activeTab);
            const sFinal = filter(sList); const aFinal = filter(aList);
            if (sortByStatus) {
              const fn = (a, b) => {
                const aR = !timers[a.id]?.endTime || timers[a.id].endTime <= currentTime;
                const bR = !timers[b.id]?.endTime || timers[b.id].endTime <= currentTime;
                return aR === bR ? 0 : aR ? -1 : 1;
              };
              sFinal.sort(fn); aFinal.sort(fn);
            } else {
               const specialSort = (a, b) => {
                 const aS = a.zone.includes('全境');
                 const bS = b.zone.includes('全境');
                 if (aS && !bS) return -1;
                 if (!aS && bS) return 1;
                 return 0;
               };
               sFinal.sort(specialSort); aFinal.sort(specialSort);
            }
            return { s: sFinal, a: aFinal };
          }, [activeTab, timers, sortByStatus, currentTime]);

          const liveAlerts = useMemo(() => {
            const res = [];
            Object.keys(HUNT_DATA).forEach(k => {
                if (activeTab !== 'all' && activeTab !== k) return;            
                if(HUNT_DATA[k].s) HUNT_DATA[k].s.forEach((m, i) => { 
                    const isSS = ['水晶化身之王', '克爾', '得到寬恕的叛亂'].includes(m.cn) || (m.trigger && m.trigger.includes('特殊'));
                    if (isSS) return;

                    const id = `${k}-s-${i}`; 
                    if (!timers[id]?.endTime || timers[id].endTime <= currentTime) res.push({ ...m, id, rank: 's', expKey: k }); 
                });
                if(HUNT_DATA[k].a) HUNT_DATA[k].a.forEach((m, i) => { const id = `${k}-a-${i}`; if (!timers[id]?.endTime || timers[id].endTime <= currentTime) res.push({ ...m, id, rank: 'a', expKey: k }); });
            });
            return res.slice(0, 30);
          }, [timers, currentTime, activeTab]);

          return (
            <div className={`min-h-screen ${styles.bg} p-4 pb-96 font-black transition-all duration-500`}>
              <header className={`mb-4 md:mb-8 border-b ${styles.headerBg} p-4 md:p-8 rounded-[2rem] md:rounded-[2.5rem] relative z-20 font-black`}>
                
                <div className="flex flex-col md:flex-row justify-between items-center md:items-start gap-4 mb-6 font-black">
                   
                   <div className="flex items-center gap-3 md:gap-4 w-full md:w-auto">
                      <img 
                        src="https://raw.githubusercontent.com/victricem/ff14-hunt/main/logo.png" 
                        alt="Hunt Logo" 
                        className="w-12 h-12 md:w-16 md:h-16 rounded-2xl border-2 border-yellow-500/30 shrink-0 shadow-lg"
                      />
                      <div className="text-left font-black">
                         <h1 className="text-2xl md:text-4xl font-black tracking-tighter leading-none">FFXIV 繁中狩獵助手</h1>
                         <p className="text-slate-500 text-[10px] md:text-xs uppercase tracking-widest font-black opacity-80">FFXIV Hunt Tracker v3.5</p>
                      </div>
                   </div>

                   <div className={`w-full md:w-auto px-4 py-2.5 rounded-2xl border-2 flex items-center justify-between md:justify-start gap-3 transition-all ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>
                      {user && !user.isAnonymous ? (
                         <>
                            <div className="flex items-center gap-3 overflow-hidden">

                               <img src={user.photoURL} alt="Avatar" className="w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-white/20 shrink-0" />
                               
                               <div className="flex flex-col items-start md:items-end min-w-0">
                                  <div className="flex items-center gap-1 text-[9px] md:text-[10px] text-slate-500 uppercase font-bold tracking-wider">
                                     <User className="w-3 h-3" /> <span>獵人稱號</span>
                                  </div>
                                  
                                  {isEditingName ? (
                                      <input 
                                        autoFocus
                                        type="text" 
                                        value={tempName} 
                                        onChange={(e) => setTempName(e.target.value)} 
                                        onBlur={handleSaveName}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSaveName()}
                                        placeholder="輸入稱號..."
                                        className={`text-sm md:text-xs font-bold bg-transparent border-b-2 ${isMidnight?'border-blue-500 text-white':'border-blue-500 text-black'} w-24 focus:outline-none`}
                                      />
                                  ) : (
                                      <div 
                                        onClick={() => setIsEditingName(true)}
                                        className={`text-sm md:text-xs font-bold border-b border-transparent hover:border-dashed hover:border-slate-400 cursor-pointer truncate max-w-[120px] md:max-w-[100px] ${!hunterName ? 'text-blue-500 animate-pulse' : (isMidnight ? 'text-slate-200' : 'text-slate-800')}`}
                                      >
                                        {hunterName || '點擊設定...'}
                                      </div>
                                  )}
                               </div>
                            </div>
                            
                            <button onClick={logout} className="p-2 md:p-2 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all shrink-0">
                                <LogOut className="w-4 h-4 md:w-4 md:h-4"/>
                            </button>
                         </>
                      ) : (
                         <button onClick={loginWithGoogle} className="w-full flex items-center justify-center gap-2 text-xs font-bold text-blue-500 hover:text-blue-400 transition-all py-1">
                            <div className="p-1.5 bg-blue-500 text-white rounded-lg"><LogIn className="w-4 h-4" /></div>
                            <span>Google 登入 (啟用回報)</span>
                         </button>
                      )}
                   </div>
                </div>

                <div className="flex flex-col xl:flex-row justify-between items-end gap-4 font-black">
                   <div className="grid grid-cols-3 gap-2 w-full xl:w-auto">
                     <button onClick={() => { if(isAdmin){ setIsAdmin(false); localStorage.setItem('ff-is-admin', 'false'); } else { setShowAdminModal(true); } }} className={`py-3 rounded-xl border-2 text-[10px] uppercase transition-all shadow-sm font-black flex items-center justify-center gap-1 ${isAdmin ? 'bg-emerald-600/20 border-emerald-500 text-emerald-400' : styles.btn}`}>{isAdmin ? '領隊 ON' : '領隊授權'}</button>
                     <button onClick={() => setShowWeatherModal(true)} className={`py-3 rounded-xl border-2 text-[10px] uppercase font-black ${styles.btn}`}>天氣預報</button>
                     <button onClick={() => { const nt = isMidnight?'sunlight':'midnight'; setTheme(nt); localStorage.setItem('ff-theme', nt); }} className={`py-3 rounded-xl border-2 text-[10px] uppercase font-black ${styles.btn}`}>{isMidnight ? '切換日光' : '切換深夜'}</button>
                   </div>

                   <div className="grid grid-cols-3 md:flex md:flex-row gap-2 w-full xl:w-auto">
                     <div className={`p-2 md:px-4 md:py-3 rounded-2xl border-2 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>
                        <Moon className="w-4 h-4 md:w-5 md:h-5 text-indigo-400" />
                        <div className="text-center md:text-left">
                            <div className="text-[9px] text-slate-500 uppercase font-black leading-none mb-0.5">Moon</div>
                            <div className="text-xs md:text-lg font-black leading-none">{eorzeaData.moonLabel}</div>
                        </div>
                     </div>
                     <div className={`p-2 md:px-4 md:py-3 rounded-2xl border-2 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'}`}>
                        <Sun className="w-4 h-4 md:w-5 md:h-5 text-yellow-500" />
                        <div className="text-center md:text-left">
                            <div className="text-[9px] text-slate-500 uppercase font-black leading-none mb-0.5">ET</div>
                            <div className="text-sm md:text-2xl font-mono font-black leading-none">{eorzeaData.displayTime}</div>
                        </div>
                     </div>
                     <div className={`p-2 md:px-4 md:py-3 rounded-2xl border-2 flex flex-col md:flex-row items-center justify-center md:justify-start gap-1 md:gap-3 ${isMidnight ? 'bg-blue-500/10 border-blue-500/20' : 'bg-white border-blue-500/20'}`}>
                        <Clock className="w-4 h-4 md:w-5 md:h-5 text-blue-500" />
                        <div className="text-center md:text-left">
                            <div className="text-[9px] text-slate-500 uppercase font-black leading-none mb-0.5">LT　UTC+8</div>
                            <div className="text-sm md:text-xl font-mono font-black leading-none">{new Date(currentTime).toLocaleTimeString([], {hour12:false})}</div>
                        </div>
                     </div>
                   </div>
                </div>
              </header>

              <div className={`mb-6 md:mb-10 flex flex-col md:flex-row items-stretch border rounded-[2rem] md:rounded-[2.5rem] overflow-hidden shadow-2xl backdrop-blur-md ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-white border-slate-200'} font-black`}>
                <div className="w-full md:w-auto h-12 md:h-auto px-6 md:px-8 py-2 md:py-4 bg-gradient-to-r md:bg-gradient-to-br from-blue-600 to-indigo-700 text-white flex md:flex-col flex-row items-center justify-between md:justify-center gap-3 font-black">
                    <div className="flex items-center gap-2 md:gap-0 md:flex-col"><Megaphone className="w-5 h-5 md:w-6 md:h-6 animate-bounce" /><span className="text-[10px] md:text-[10px] uppercase font-black tracking-widest mt-0 md:mt-1">Live Feed</span></div>
                    <span className="md:hidden text-[10px] opacity-60 font-normal tracking-wider">左右滑動 ↔</span>
                </div>
                <div ref={scrollRef} onMouseDown={(e) => { isDragging.current = true; startX.current = e.pageX - scrollRef.current.offsetLeft; scrollLeftVal.current = scrollRef.current.scrollLeft; }} onMouseMove={(e) => { if (!isDragging.current) return; e.preventDefault(); const walk = (e.pageX - scrollRef.current.offsetLeft - startX.current) * 2; scrollRef.current.scrollLeft = scrollLeftVal.current - walk; }} onMouseUp={() => isDragging.current = false} onMouseLeave={() => isDragging.current = false} className="flex-1 flex gap-4 overflow-x-auto custom-scrollbar-horizontal py-4 px-4 md:py-6 md:px-6 items-center cursor-grab active:cursor-grabbing select-none font-black">
                  {liveAlerts.length > 0 ? liveAlerts.map(m => {
                    const timer = timers[m.id];
                    const statusObj = formatStatusObj(timer?.endTime, currentTime, isMidnight, m.rank);
                    const winText = getCombinedWindowText(m, eorzeaData);
                    const isSpecial = m.rank === 'ss' || m.zone.includes('全境');
                    let baseColor = 'slate'; let dotColorClass = 'bg-slate-400'; let borderColorClass = 'border-slate-300'; let bgGradientClass = 'from-slate-500/5';

                                    </div>
                                  </div>

                                  <div className="flex flex-row md:flex-col items-center gap-2 md:gap-4 mt-6 md:mt-0 pt-3 md:pt-0 border-t md:border-t-0 border-dashed border-white/10 w-full md:w-auto shrink-0">
                                    {isAdmin && <button onClick={(e) => { e.stopPropagation(); setEditingTimeId(isEditing?null:m.id); }} className={`flex-1 md:flex-none p-3 md:p-5 rounded-2xl border-2 justify-center flex items-center transition-all font-black ${styles.btn}`}><Edit3 className="w-5 h-5 md:w-7 md:h-7"/></button>}
                                    <button onClick={(e) => {e.stopPropagation(); setHistoryTarget({isOpen: true, mobId: m.id, mobName: m.cn})}} className={`flex-1 md:flex-none p-3 md:p-5 rounded-2xl border-2 justify-center flex items-center transition-all hover:scale-110 font-black ${styles.btn}`}><FileClock className="w-5 h-5 md:w-7 md:h-7" /></button>
                                    <button onClick={() => toggleTrainMob(m)} className={`flex-1 md:flex-none p-3 md:p-5 rounded-2xl border-2 justify-center flex items-center font-black ${styles.btn} ${inTrain ? 'bg-emerald-600 text-white border-emerald-500' : ''}`}>{inTrain ? <Check className="w-5 h-5 md:w-7 md:h-7" /> : <ListPlus className="w-5 h-5 md:w-7 md:h-7" />}</button>
                                    <button onClick={() => requestToggleKill(m.id, m.cn, 4)} className={`flex-[2] md:flex-none p-3 md:p-5 rounded-2xl border-2 justify-center flex items-center transition-all active:scale-95 font-black ${isKilled?(isMidnight ? 'bg-blue-950/40 border-blue-500/50 text-blue-400' : 'bg-red-600 text-white'):(isMidnight?'bg-emerald-950/40 border-emerald-500/50 text-emerald-400':'bg-emerald-600 text-white')}`}>{isKilled?<RotateCcw className="w-6 h-6 md:w-7 md:h-7"/>:<CheckCircle className="w-6 h-6 md:w-7 md:h-7"/>}</button>
                                  </div>
                                </div>
                              ) : (

                                <div className="w-full flex items-center justify-between gap-2 font-black text-left">
                                  <div className="flex items-center gap-2 md:gap-8 flex-1 min-w-0 font-black">
                                    <span className="text-[10px] text-blue-500 w-8 md:w-12 shrink-0">[{selectedServer.slice(0,2)}]</span>
                                    <div className="flex flex-col min-w-0 flex-1">
                                      <div className="flex flex-wrap items-baseline gap-x-2 gap-y-0.5 mb-0.5">
                                          <span className="text-[9px] md:text-[10px] text-slate-500 uppercase truncate">{m.zone}</span>
                                          <span className={`md:hidden text-[10px] font-bold ${statusObj.color}`}>
                                              {statusObj.label}
                                          </span>
                                      </div>
                                      <div className="flex items-center gap-1"><span className="text-base md:text-xl font-black truncate">{m.cn}</span>{isSpecial && <Crown className="w-3 h-3 md:w-5 md:h-5 text-amber-500 fill-current shrink-0"/>}</div>
                                      
                                      {!isKilled && winText && winText !== "一週內無符合條件" && (
                                          <div className="mt-1">
                                              <span className="text-[11px] md:text-xs text-emerald-500 font-bold">
                                                  ⚡ {winText}
                                              </span>
                                          </div>
                                      )}
                                    </div>

                                    <div className="hidden md:flex items-center justify-end gap-4 shrink-0 ml-auto whitespace-nowrap min-w-[240px]">
                                      <div className={`text-sm text-right ${statusObj.color}`}>{statusObj.label}</div>
                                    </div>
                                  </div>
                                  <div className="flex gap-1 md:gap-3 shrink-0">
                                    {isAdmin && <button onClick={(e) => {e.stopPropagation(); setEditingTimeId(isEditing ? null : m.id)}} className={`p-1.5 md:p-2.5 rounded-lg border-2 font-black ${styles.btn}`}><Edit3 className="w-4 h-4 md:w-5 md:h-5"/></button>}
                                    <button onClick={(e) => {e.stopPropagation(); setHistoryTarget({isOpen: true, mobId: m.id, mobName: m.cn})}} className={`p-1.5 md:p-2.5 rounded-lg border-2 font-black ${styles.btn}`}><FileClock className="w-4 h-4 md:w-5 md:h-5" /></button>
                                    <button onClick={(e) => {e.stopPropagation(); toggleTrainMob(m)}} className={`p-1.5 md:p-2.5 rounded-lg border-2 font-black ${styles.btn} ${inTrain ? 'bg-emerald-600 text-white border-emerald-500' : ''}`}>{inTrain ? <Check className="w-4 h-4 md:w-5 md:h-5" /> : <ListPlus className="w-4 h-4 md:w-5 md:h-5" />}</button>
                                    <button onClick={(e) => {e.stopPropagation(); requestToggleKill(m.id, m.cn, 4)}} className={`p-1.5 md:p-2.5 rounded-lg text-white shadow-lg ${isKilled?'bg-red-600':'bg-emerald-600'}`}>{isKilled?<RotateCcw className="w-4 h-4 md:w-4 md:h-4"/>:<CheckCircle className="w-4 h-4 md:w-4 md:h-4"/>}</button>
                                  </div>
                                </div>
                              )}
                            </div>

                            {isOpen && viewMode === 'list' && (
                                <div className={`p-6 md:p-8 text-xs md:text-sm border-l-8 border-l-blue-600 animate-in slide-in-from-top-2 font-black ${isMidnight ? 'bg-white/5 text-slate-400' : 'bg-black/5 text-slate-500 shadow-inner'}`}>
                                    <div className="flex flex-col gap-2">
                                        <div className="flex items-center gap-2 opacity-80">
                                          <Clock className="w-4 h-4" /> 
                                          <span>上次擊殺時間：{formatDateTime(timer?.startTime)}</span>
                                        </div>
                                        {m.trigger && (
                                          <div className="mt-2 pt-2 border-t border-white/10 opacity-60">
                                            <span className="font-bold block mb-1 text-blue-400">💡 觸發條件：</span>
                                            {m.trigger}
                                          </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {(isAdmin && (viewMode === 'card' || isEditing)) && <CalibrationUI isOpen={true} mobId={m.id} win={4} isListView={viewMode === 'list'} isMidnight={isMidnight} styles={styles} onInputChange={setCustomTimeInput} onUpdate={handleUpdateKillTime} />}
                          </div>
                        );
                      })}
                    </div>
                  </section>
                </div>
              )}

              {showAdminModal && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/98 backdrop-blur-2xl font-black font-black font-black">
                  <div className={`${isMidnight ? 'bg-[#12141e] border-white/5' : 'bg-white border-slate-200'} border-2 p-16 rounded-[5rem] shadow-2xl max-sm w-full text-center font-black font-black`}>
                    <h2 className={`text-3xl mb-12 italic uppercase font-black tracking-tight ${isMidnight ? 'text-white' : 'text-slate-900'}`}>領隊授權驗證</h2>
                    <input type="password" value={inputKey} onChange={(e) => setInputKey(e.target.value)} placeholder="******" className={`w-full ${isMidnight ? 'bg-black/50 border-white/10 text-yellow-500 font-black' : 'bg-black/5 border-slate-200'} border-2 p-8 rounded-[2.5rem] mb-12 text-center text-4xl outline-none transition-all shadow-inner font-mono font-black font-black font-black`} onKeyDown={(e) => e.key === 'Enter' && verifyAdminHandler()}/><div className="flex gap-6 font-black font-black"><button onClick={() => setShowAdminModal(false)} className={`flex-1 py-6 rounded-3xl border-2 uppercase text-xs font-black ${styles.btn}`}>取消</button><button onClick={verifyAdminHandler} className="flex-1 py-6 bg-yellow-600 text-white rounded-3xl text-xs font-black uppercase hover:bg-yellow-500 shadow-2xl active:scale-95 transition-all font-black font-black font-black">驗證</button></div>
                  </div>
                </div>
              )}

              {confirmModal.isOpen && (
                <div className="fixed inset-0 z-[250] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl animate-in fade-in duration-200 font-black font-black font-black">
                    <div className={`${isMidnight ? 'bg-[#12141e] border-white/5' : 'bg-white border-slate-200'} border-2 p-12 rounded-[4rem] shadow-2xl max-w-sm w-full text-center font-black font-black font-black`}>
                      <div className="flex justify-center mb-10 font-black">
                        <div className={`p-6 rounded-full ${confirmModal.type === 'kill' ? 'bg-emerald-500/10 text-emerald-500 font-black font-black' : 'bg-red-500/10 text-red-500 font-black'}`}><AlertCircle className="w-16 h-16 font-black" /></div>
                      </div>
                      <h3 className={`text-3xl font-black mb-5 ${isMidnight ? 'text-white' : 'text-slate-900'}`}>{confirmModal.type === 'kill' ? '確定擊殺' : '重置時間'}</h3>
                      <p className={`text-base mb-12 ${isMidnight ? 'text-slate-400' : 'text-slate-500'} leading-relaxed font-bold font-black font-black`}>{confirmModal.type === 'kill' ? `確定要將 [${confirmModal.name}] 標記為擊殺並啟動冷卻倒數嗎？` : `是否重置 [${confirmModal.name}] 的倒數時間？`}</p>
                      <div className="flex gap-6 font-black font-black">
                        <button onClick={() => setConfirmModal({ ...confirmModal, isOpen: false })} className={`flex-1 py-5 border-2 rounded-3xl uppercase text-xs font-black font-black font-black ${styles.btn}`}>取消</button>
                        <button onClick={executeToggleKill} className={`flex-1 py-5 rounded-3xl text-white text-xs font-black shadow-2xl transition-all active:scale-95 font-black font-black font-black ${confirmModal.type === 'kill' ? 'bg-emerald-600 hover:bg-emerald-500' : 'bg-red-600 hover:bg-red-500'}`}>確定</button>
                      </div>
                    </div>
                </div>
              )}

              {showWeatherModal && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 md:p-6 bg-black/90 backdrop-blur-xl animate-in fade-in duration-300 font-black">
                    <div className={`${isMidnight ? 'bg-[#12141e] border-white/5' : 'bg-white border-slate-200'} border-2 p-5 md:p-10 rounded-[2.5rem] md:rounded-[5rem] max-w-4xl w-full text-left shadow-2xl flex flex-col max-h-[90vh] md:max-h-auto overflow-hidden`}>
                      
                      <div className={`flex justify-between items-center mb-4 md:mb-10 border-b ${isMidnight ? 'border-white/5' : 'border-slate-100'} pb-4 md:pb-8 shrink-0`}>
                        <h2 className="text-xl md:text-3xl uppercase flex items-center gap-3 md:gap-5 tracking-tight font-black">
                          <CloudSun className="w-6 h-6 md:w-10 md:h-10 text-blue-400" /> 
                          <span>天氣預測系統</span>
                        </h2>
                        <button onClick={() => setShowWeatherModal(false)} className={`p-2 md:p-4 rounded-full ${styles.btn}`}>
                          <X className="w-6 h-6 md:w-8 md:h-8" />
                        </button>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-12 overflow-y-auto md:overflow-visible custom-scrollbar pr-1 md:pr-0">
                        
                        <div className={`p-5 md:p-10 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-black/5 border-slate-200'} rounded-[2rem] md:rounded-[3rem] border shadow-2xl flex flex-col justify-center shrink-0`}>
                          <div className="flex flex-row md:flex-col justify-between items-center md:items-start gap-4">
                              <div>
                                  <div className="text-[10px] md:text-[12px] uppercase text-slate-500 mb-1 md:mb-2 tracking-[0.2em] font-black">Current Eorzea Day</div>
                                  <div className="text-3xl md:text-6xl font-mono md:mb-8 flex items-baseline gap-2 md:gap-4 font-black">
                                      Day {eorzeaData.day} 
                                      <span className="text-lg md:text-2xl opacity-40">{eorzeaData.moonLabel}</span>
                                  </div>
                              </div>
                              <div className="text-right md:text-left bg-black/10 md:bg-transparent px-3 py-2 md:p-0 rounded-xl">
                                  <div className="text-[10px] md:text-sm font-bold text-slate-400 mb-0.5 md:mb-2">下次換天氣</div>
                                  <div className="text-yellow-500 text-xl md:text-3xl font-mono tracking-tighter font-black">約 {eorzeaData.nextIn}</div>
                              </div>
                          </div>
                        </div>

                        <div className="space-y-3 md:space-y-6">
                           <h3 className="text-[10px] md:text-[11px] font-black uppercase text-slate-500 px-2 tracking-[0.3em]">重點地圖預報</h3>
                           <div className="space-y-2 md:space-y-3">
                             {Object.keys(MAP_WEATHER_LOGIC).map(n => (
                               <div key={n} className={`p-4 md:p-5 ${isMidnight ? 'bg-white/5 border-white/5' : 'bg-black/5 border-slate-110'} border rounded-2xl md:rounded-3xl flex justify-between items-center transition-all hover:bg-white/[0.08]`}>
                                  <span className="text-sm md:text-base font-black">{n}</span>
                                  <div className="text-right">
                                    <div className="text-base md:text-lg text-blue-400 font-black">{MAP_WEATHER_LOGIC[n](eorzeaData.curVal)}</div>
                                    <div className="text-[10px] md:text-[11px] text-slate-500 font-bold uppercase">Next: {MAP_WEATHER_LOGIC[n](eorzeaData.nxtVal)}</div>
                                  </div>
                               </div>
                             ))}
                           </div>
                        </div>
                      </div>
                    </div>
                </div>
              )}

              <HistoryLogModal isOpen={historyTarget.isOpen} onClose={() => setHistoryTarget({...historyTarget, isOpen: false})} server={selectedServer} mobId={historyTarget.mobId} mobName={historyTarget.mobName} isMidnight={isMidnight} styles={styles} />

              {trainList.length > 0 && (
                <DragDropContext onDragEnd={onDragEnd}>
                  <div className={`fixed bottom-4 left-2 right-2 md:left-8 md:right-8 z-50 rounded-3xl border shadow-2xl backdrop-blur-xl animate-in slide-in-from-bottom-10 duration-300 font-black ${isMidnight ? 'bg-[#12141e]/95 border-white/10' : 'bg-white/95 border-slate-200'}`}>
                    
                    <div className="flex items-center justify-between p-4 pb-2">
                      <div className="flex items-center gap-3">
                        <div className={`p-2 rounded-xl ${isMidnight ? 'bg-blue-600/20 text-blue-400' : 'bg-blue-100 text-blue-600'}`}>
                          <Share2 className="w-5 h-5" />
                        </div>
                        <div>
                          <div className={`text-xs font-bold uppercase tracking-wider ${isMidnight ? 'text-slate-400' : 'text-slate-500'}`}>Hunt Train</div>
                          <div className={`text-sm font-black ${isMidnight ? 'text-white' : 'text-slate-900'}`}>跨服名單 ({trainList.length})</div>
                        </div>
                      </div>
                      
                      <div className="flex items-center gap-2">
                        <button onClick={() => setTrainList([])} className={`p-2.5 rounded-xl transition-all active:scale-95 ${isMidnight ? 'hover:bg-white/5 text-slate-400 hover:text-red-400' : 'hover:bg-slate-100 text-slate-400 hover:text-red-500'}`}>
                          <Trash2 className="w-5 h-5" />
                        </button>
                        <button onClick={copyMacro} className="flex items-center gap-2 bg-blue-600 text-white px-4 py-2.5 rounded-xl text-xs font-black shadow-lg shadow-blue-500/30 active:scale-95 transition-all">
                          <span>{copyStatus || '複製指令宏'}</span>
                        </button>
                      </div>
                    </div>

                    <Droppable droppableId="train-list" direction="horizontal">
                      {(provided) => (
                        <div 
                          ref={provided.innerRef} 
                          {...provided.droppableProps}
                          className="flex overflow-x-auto gap-3 p-4 pt-2 custom-scrollbar scroll-smooth"
                        >
                          {trainList.map((m, i) => (
                            <Draggable key={m.uniqueId} draggableId={m.uniqueId} index={i}>
                              {(provided, snapshot) => (
                                <div
                                  ref={provided.innerRef}
                                  {...provided.draggableProps}
                                  {...provided.dragHandleProps}
                                  style={{ ...provided.draggableProps.style }}
                                  className={`relative group shrink-0 flex items-center gap-3 p-3 pr-4 rounded-2xl border min-w-[160px] max-w-[200px] transition-colors select-none 
                                    ${snapshot.isDragging 
                                      ? (isMidnight ? 'bg-blue-900/40 border-blue-500 shadow-xl z-50' : 'bg-blue-50 border-blue-500 shadow-xl z-50') 
                                      : (isMidnight ? 'bg-black/20 border-white/5 hover:border-white/20' : 'bg-slate-50 border-slate-200 hover:border-blue-300')
                                    }`}
                                >
                                  <div className="flex flex-col min-w-0">
                                    <div className="flex items-center gap-1.5 mb-0.5">
                                      <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold leading-none ${snapshot.isDragging ? 'bg-blue-500 text-white' : 'bg-blue-600 text-white'}`}>
                                        {i + 1}
                                      </span>
                                      <span className="text-[10px] text-blue-500 font-bold truncate">[{m.server}]</span>
                                    </div>
                                    <div className={`text-sm font-black truncate ${isMidnight ? 'text-slate-200' : 'text-slate-800'}`}>{m.cn}</div>
                                    <div className="text-[9px] text-slate-500 truncate opacity-60">{m.zone}</div>
                                  </div>
                                  
                                  <button 
                                    onPointerDown={(e) => e.stopPropagation()}
                                    onClick={(e) => {e.stopPropagation(); setTrainList(trainList.filter((t) => t.uniqueId !== m.uniqueId))}} 
                                    className={`absolute -top-2 -right-2 p-1.5 rounded-full shadow-sm opacity-0 group-hover:opacity-100 transition-all ${isMidnight ? 'bg-red-900 text-red-200' : 'bg-red-100 text-red-600'}`}
                                  >
                                    <X className="w-3 h-3" />
                                  </button>
                                </div>
                              )}
                            </Draggable>
                          ))}
                          {provided.placeholder}
                          <div className="w-2 shrink-0"></div>
                        </div>
                      )}
                    </Droppable>
                  </div>
                </DragDropContext>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
